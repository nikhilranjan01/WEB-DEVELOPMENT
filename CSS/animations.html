<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .box{
         width: 200px;
         height: 200px;
         background-color: aquamarine;
         box-shadow: insert -10px -15px -5px aqua;
         transition: 1s ease-in-out;
         }
         .box:hover{
            box-shadow: 50px 20px 200px 5px greenyellow;
            transform: scale(1,25,1,25)rotate(45deg);
            border-radius: 50%;
         }
         body{
            height: 100vh;
            display: flex;
            justify-content: center;
            text-align:center;

         }



    </style>

</head>
<body>
    <div class="box"></div>
</body>
</html>
